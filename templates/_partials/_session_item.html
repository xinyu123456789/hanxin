<div id="session-item-{{ s.id }}"
     x-data="{open: false}"
     @click.outside="open = false"
     style="position:relative;padding:2px 8px">

  {# ── session 列（標題 + 三點按鈕）── #}
  <div class="row between" style="align-items:stretch;gap:4px">
    <a href="{% if session and s.id == session.id %}#{% else %}{% url 'chat_session' s.id %}{% endif %}"
       class="session-item {% if session and s.id == session.id %}active{% endif %}"
       style="flex:1;margin:0;padding-right:4px"
       @click="open = false">
      <div style="font-weight:600;font-size:14px;line-height:1.4;margin-bottom:3px">
        {% if s.crisis_mode %}<span style="color:var(--peach-deep)">⚠️ </span>{% endif %}
        {{ s.title }}
      </div>
      <div class="faint" style="font-size:12px">
        {{ s.created_at|date:"m/d H:i" }} · {{ s.msg_count }} 則
        {% if not s.end_time %}<span style="color:var(--sage-deep)"> · 進行中</span>{% endif %}
      </div>
    </a>

    {# 三點按鈕：直接開確認框 #}
    <button @click.stop="open = !open"
            type="button"
            class="kebab-btn"
            :class="open ? 'kebab-open' : ''"
            style="flex:0 0 auto;width:28px;height:28px;border-radius:9px;
                   display:grid;place-items:center;cursor:pointer;align-self:center;
                   transition:background .15s;background:transparent">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
           style="pointer-events:none;display:block">
        <circle cx="8" cy="3" r="1.6" fill="var(--ink-soft)"/>
        <circle cx="8" cy="8" r="1.6" fill="var(--ink-soft)"/>
        <circle cx="8" cy="13" r="1.6" fill="var(--ink-soft)"/>
      </svg>
    </button>
  </div>

  {# ── 確認框（點 ⋮ 直接開，不用再點一次）── #}
  <div x-show="open" x-cloak x-transition
       style="margin-top:6px;padding:12px 14px;border-radius:12px;
              background:var(--peach-tint);border:1.5px solid var(--peach)">
    <p style="font-size:12px;color:var(--ink-soft);margin:0 0 10px;line-height:1.5">
      刪除後無法復原，這段對話記錄將永久消失。
    </p>
    <div class="row" style="gap:6px">
      <button @click="open = false"
              type="button"
              class="btn btn-ghost btn-sm" style="flex:1;font-size:12px">
        取消
      </button>
      <button hx-post="{% url 'session_delete' s.id %}"
              hx-swap="none"
              hx-on:htmx:after-on-load="document.getElementById('session-item-{{ s.id }}').remove(); if(typeof clearIfCurrentSession==='function') clearIfCurrentSession({{ s.id }})"
              type="button"
              class="btn btn-sm"
              style="flex:1;font-size:12px;background:var(--peach-deep);
                     box-shadow:0 8px 16px -10px rgba(199,100,80,.8)">
        <span class="del-normal">確認刪除</span>
        <span class="del-loading">刪除中...</span>
      </button>
    </div>
  </div>

</div>
